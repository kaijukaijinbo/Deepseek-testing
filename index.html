<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>curved text spin · transparent overlay</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #1a1a2b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            transition: background 0.2s;
            margin: 0;
        }

        /* main app container */
        .app {
            width: 1300px;
            max-width: 95vw;
            background: rgba(20, 20, 35, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 3rem 2rem 2rem 3rem;
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.06);
            padding: 2rem 1.8rem;
            transition: all 0.25s ease;
        }

        /* FOCUS MODE — completely transparent background for OBS overlay */
        .app.focus-mode {
            background: transparent !important;
            backdrop-filter: none;
            box-shadow: none;
            width: 100vw;
            max-width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            border-radius: 0;
        }

        .app.focus-mode .control-panel,
        .app.focus-mode .footer-note,
        .app.focus-mode .focus-hint {
            display: none;
        }

        .app.focus-mode .ring-wrapper {
            background: transparent;
            border: none;
            box-shadow: none;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app.focus-mode .ring-container {
            max-width: 90vmin;
            max-height: 90vmin;
        }

        .app.focus-mode canvas {
            box-shadow: none;
            background: transparent !important;  /* ensures canvas is transparent */
            border-radius: 0;
        }

        /* two‑column layout */
        .dashboard {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* control panel (glass card) */
        .control-panel {
            flex: 1 1 340px;
            background: rgba(24, 24, 40, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 1.8rem 1.5rem;
            color: #eeeaff;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 30px -10px black;
            height: fit-content;
        }

        .control-panel h2 {
            font-weight: 350;
            font-size: 1.5rem;
            letter-spacing: 1px;
            margin-bottom: 1.8rem;
            border-bottom: 1px dashed #5f5c8a;
            padding-bottom: 0.7rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .control-group {
            margin-bottom: 1.7rem;
        }

        .control-group label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #c7c1e6;
            margin-bottom: 0.5rem;
        }

        .control-group label span:first-child {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        input, select {
            background: #211f34;
            border: 1px solid #4f4b70;
            border-radius: 2.5rem;
            padding: 0.6rem 1.2rem;
            color: white;
            font-size: 0.95rem;
            width: 100%;
            outline: none;
            transition: 0.15s;
        }

        input[type="range"] {
            padding: 0;
            background: transparent;
            accent-color: #b48cf2;
        }

        input[type="color"] {
            height: 3rem;
            padding: 0.2rem;
            cursor: pointer;
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23b48cf2' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: right 1.2rem center;
            background-size: 1rem;
        }

        .inline-slider {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .inline-slider input {
            flex: 1;
        }

        .inline-slider output {
            min-width: 3.5rem;
            text-align: right;
            background: #1b192b;
            padding: 0.3rem 0.7rem;
            border-radius: 3rem;
            font-size: 0.9rem;
            font-feature-settings: "tnum";
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin: 2rem 0 0.3rem;
        }

        button {
            background: #3c3657;
            border: none;
            border-radius: 3rem;
            padding: 0.8rem 1.6rem;
            font-weight: 500;
            color: #f0ecff;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.15s;
            flex: 1 0 auto;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }

        button:hover {
            background: #554b7a;
            border-color: #c3adff;
            transform: scale(1.02);
        }

        button.primary {
            background: #7a65c2;
            color: white;
            font-weight: 600;
            box-shadow: 0 8px 18px #3d3361;
        }

        button.primary:hover {
            background: #9882e6;
        }

        .ring-wrapper {
            flex: 1 1 460px;
            min-width: 340px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 2.5rem;
            padding: 1rem;
            border: 1px solid rgba(255,255,255,0.04);
            transition: background 0.2s;
        }

        .ring-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            max-width: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 50%;
            box-shadow: 0 15px 30px -8px black, 0 0 0 1px rgba(255,255,255,0.08);
            background: transparent;
            transition: box-shadow 0.2s, background 0.2s, border-radius 0.2s;
        }

        .focus-hint {
            margin-top: 1.2rem;
            text-align: center;
            color: #9d96c0;
            font-size: 0.8rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        kbd {
            background: #2e2a44;
            border-radius: 0.5rem;
            padding: 0.2rem 0.8rem;
            font-family: 'Fira Code', monospace;
            border: 1px solid #736d9a;
        }

        .footer-note {
            font-size: 0.8rem;
            text-align: center;
            margin-top: 2rem;
            color: #7f79a2;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="dashboard">
        <!-- CONTROL PANEL -->
        <div class="control-panel" id="controlPanel">
            <h2>
                <span>✦ curved text spinner</span>
            </h2>

            <div class="control-group">
                <label><span>📝 your text</span></label>
                <input type="text" id="textInput" value="✦ CURVED AND SPINNING ✦" placeholder="message">
            </div>

            <div class="control-group">
                <label><span>🔠 font size</span> <span id="fontSizeVal">42</span></label>
                <div class="inline-slider">
                    <input type="range" id="fontSize" min="14" max="110" value="42" step="1">
                </div>
            </div>

            <div class="control-group">
                <label><span>✒️ typeface</span></label>
                <select id="fontFamily">
                    <option value="Inter, 'Segoe UI', system-ui, sans-serif" selected>Inter (sans)</option>
                    <option value="'Times New Roman', serif">Times New Roman</option>
                    <option value="'Courier New', monospace">Courier New</option>
                    <option value="'Arial Black', sans-serif">Arial Black</option>
                    <option value="Georgia, serif">Georgia</option>
                    <option value="'Comic Sans MS', cursive, sans-serif">Comic Sans</option>
                    <option value="'Brush Script MT', cursive">Brush Script</option>
                </select>
            </div>

            <div class="control-group" style="display: flex; gap: 1rem;">
                <div style="flex:1">
                    <label><span>🎨 color</span></label>
                    <input type="color" id="textColor" value="#f0f0ff">
                </div>
                <div style="flex:1">
                    <label><span>🟨 highlight</span></label>
                    <input type="color" id="highlightColor" value="#aa7eec">
                </div>
            </div>

            <div class="control-group">
                <label><span>🌀 opacity</span> <span id="opacityVal">1.00</span></label>
                <input type="range" id="opacitySlider" min="0.1" max="1" step="0.01" value="1">
            </div>

            <div class="control-group">
                <label><span>⚡ spin speed</span> <span id="speedVal">1.2</span></label>
                <input type="range" id="speedSlider" min="-3" max="3" value="1.2" step="0.1">
                <div style="display:flex; justify-content:space-between; font-size:0.7rem; opacity:0.6;">
                    <span>◀ reverse</span><span>stop</span><span>fast ▶</span>
                </div>
            </div>

            <div class="control-group">
                <label><span>📐 angle offset</span> <span id="angleVal">0°</span></label>
                <input type="range" id="angleSlider" min="0" max="360" value="0" step="1">
            </div>

            <div class="button-row">
                <button class="primary" id="focusBtn">🔮 focus (transparent)</button>
                <button id="resetBtn">↺ reset</button>
            </div>
            <div class="focus-hint">
                <span><kbd>N</kbd> toggle focus</span>
                <span><kbd>ESC</kbd> exit</span>
                <span>✨ transparent background</span>
            </div>
        </div>

        <!-- CANVAS (curved text) -->
        <div class="ring-wrapper">
            <div class="ring-container">
                <canvas id="ringCanvas" width="700" height="700"></canvas>
            </div>
        </div>
    </div>
    <div class="footer-note">continuous curve · spin control · transparent overlay ready</div>
</div>

<script>
    (function() {
        const app = document.getElementById('app');
        const canvas = document.getElementById('ringCanvas');
        const ctx = canvas.getContext('2d');

        // all inputs
        const textInput = document.getElementById('textInput');
        const fontSizeRange = document.getElementById('fontSize');
        const fontSizeSpan = document.getElementById('fontSizeVal');
        const fontFamilySelect = document.getElementById('fontFamily');
        const textColorInput = document.getElementById('textColor');
        const highlightColorInput = document.getElementById('highlightColor');
        const opacitySlider = document.getElementById('opacitySlider');
        const opacitySpan = document.getElementById('opacityVal');
        const speedSlider = document.getElementById('speedSlider');
        const speedSpan = document.getElementById('speedVal');
        const angleSlider = document.getElementById('angleSlider');
        const angleSpan = document.getElementById('angleVal');
        const focusBtn = document.getElementById('focusBtn');
        const resetBtn = document.getElementById('resetBtn');

        // state
        let rotation = 0;
        let lastTimestamp = 0;

        // helpers
        function updateLabels() {
            fontSizeSpan.textContent = fontSizeRange.value;
            opacitySpan.textContent = parseFloat(opacitySlider.value).toFixed(2);
            speedSpan.textContent = speedSlider.value;
            angleSpan.textContent = angleSlider.value + '°';
        }

        // ----- draw curved text (connected, full circle) -----
        function drawRing() {
            const text = textInput.value || '⦿';
            const fontSize = parseInt(fontSizeRange.value, 10);
            const fontFamily = fontFamilySelect.value;
            const textColor = textColorInput.value;
            const bgColor = highlightColorInput.value;
            const globalAlpha = parseFloat(opacitySlider.value);
            const angleOffsetDeg = parseFloat(angleSlider.value);
            const angleOffsetRad = (angleOffsetDeg * Math.PI) / 180;

            // Clear to transparent (always, for overlay)
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(rotation + angleOffsetRad);

            const radius = canvas.width * 0.32;          // radius to text baseline
            if (!text.length) {
                ctx.restore();
                return;
            }

            ctx.font = `${fontSize}px ${fontFamily}`;
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';

            const chars = text.split('');
            const widths = chars.map(c => ctx.measureText(c).width);
            const totalWidth = widths.reduce((a, b) => a + b, 0);

            if (totalWidth === 0) {
                ctx.restore();
                return;
            }

            const totalAngle = 2 * Math.PI;   // full circle – text curves all around
            let currentAngle = -totalAngle / 2; // start at leftmost point for symmetry

            for (let i = 0; i < chars.length; i++) {
                const char = chars[i];
                const charWidth = widths[i];
                const angleStep = (charWidth / totalWidth) * totalAngle;
                const charAngle = currentAngle + angleStep / 2;

                ctx.save();
                ctx.rotate(charAngle);
                ctx.translate(radius, 0);

                // optional highlight (soft pill behind letter)
                if (bgColor && globalAlpha > 0) {
                    const metrics = ctx.measureText(char);
                    const charHeight = fontSize * 1.2;
                    const pillWidth = metrics.width + 12;
                    const pillHeight = charHeight + 8;
                    ctx.save();
                    ctx.globalAlpha = globalAlpha * 0.45;
                    ctx.fillStyle = bgColor;
                    ctx.beginPath();
                    ctx.ellipse(0, 0, pillWidth/2, pillHeight/2, 0, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.restore();
                }

                ctx.globalAlpha = globalAlpha;
                ctx.fillStyle = textColor;
                ctx.font = `${fontSize}px ${fontFamily}`;
                ctx.fillText(char, 0, 0);

                ctx.restore();

                currentAngle += angleStep;
            }

            ctx.restore();
        }

        // animation loop
        function animate(time) {
            if (!lastTimestamp) {
                lastTimestamp = time;
                requestAnimationFrame(animate);
                return;
            }
            const delta = Math.min(100, time - lastTimestamp);
            const speedValue = parseFloat(speedSlider.value);
            const rotationDelta = speedValue * delta * 0.00157; // 2pi rad per ~4 sec at speed=1
            rotation += rotationDelta;

            lastTimestamp = time;
            drawRing();
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);

        // redraw on input changes
        function refresh() {
            updateLabels();
            drawRing();
        }

        textInput.addEventListener('input', refresh);
        fontSizeRange.addEventListener('input', refresh);
        fontFamilySelect.addEventListener('change', refresh);
        textColorInput.addEventListener('input', refresh);
        highlightColorInput.addEventListener('input', refresh);
        opacitySlider.addEventListener('input', refresh);
        speedSlider.addEventListener('input', () => {
            speedSpan.textContent = speedSlider.value;
            drawRing();
        });
        angleSlider.addEventListener('input', () => {
            angleSpan.textContent = angleSlider.value + '°';
            drawRing();
        });

        // reset defaults
        resetBtn.addEventListener('click', () => {
            textInput.value = '✦ CURVED AND SPINNING ✦';
            fontSizeRange.value = 42;
            fontFamilySelect.value = "Inter, 'Segoe UI', system-ui, sans-serif";
            textColorInput.value = "#f0f0ff";
            highlightColorInput.value = "#aa7eec";
            opacitySlider.value = "1";
            speedSlider.value = "1.2";
            angleSlider.value = "0";
            updateLabels();
            drawRing();
        });

        // FOCUS MODE — transparent overlay
        function toggleFocus() {
            app.classList.toggle('focus-mode');
        }
        function exitFocus() {
            app.classList.remove('focus-mode');
        }

        focusBtn.addEventListener('click', toggleFocus);

        // Hotkeys: N toggles focus, ESC exits focus
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                exitFocus();
            } else if (e.key === 'n' || e.key === 'N') {
                e.preventDefault();  // avoid accidental browser search
                toggleFocus();
            }
        });

        // initial draw
        updateLabels();
        drawRing();

        // ensure canvas stays sharp on resize
        window.addEventListener('resize', () => drawRing());
    })();
</script>
</body>
</html>
