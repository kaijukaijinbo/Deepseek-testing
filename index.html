<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>spinning text ring · focus mode (N key)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 1rem;
            transition: background 0.2s;
        }
        /* focus mode: transparent background + hide controls */
        body.focus-mode {
            background: transparent !important;
        }
        body.focus-mode .app {
            background: transparent !important;
            box-shadow: none;
        }
        body.focus-mode .control-panel {
            display: none;
        }
        body.focus-mode .footer-note,
        body.focus-mode .note {
            display: none;
        }
        /* keep ring visible and centered */
        body.focus-mode .ring-wrapper {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        body.focus-mode .ring-container {
            max-width: 90vmin;
            max-height: 90vmin;
        }

        .app {
            width: 1300px;
            max-width: 95vw;
            background: rgba(20, 20, 35, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 3rem 2rem 2rem 3rem;
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.06);
            padding: 2rem 1.8rem;
            transition: all 0.25s ease;
        }

        .dashboard {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-panel {
            flex: 1 1 340px;
            background: rgba(24, 24, 40, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 1.8rem 1.5rem;
            color: #eeeaff;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 30px -10px black;
            height: fit-content;
        }

        .control-panel h3 {
            font-weight: 350;
            font-size: 1.5rem;
            letter-spacing: 1px;
            margin-bottom: 1.8rem;
            border-bottom: 1px dashed #5f5c8a;
            padding-bottom: 0.7rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        input[type="text"] {
            width: 100%;
            background: #262439;
            border: 1px solid #4f4b70;
            border-radius: 3rem;
            padding: 0.9rem 1.5rem;
            color: white;
            font-size: 1.1rem;
            outline: none;
            margin-bottom: 1.5rem;
        }
        input[type="text"]:focus {
            border-color: #b48cf2;
            box-shadow: 0 0 0 2px rgba(180,140,242,0.3);
        }

        .control-grid {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-bottom: 1.8rem;
        }

        .color-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .color-item {
            flex: 1 1 200px;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            color: #dddaf0;
        }
        .color-item label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #c7c1e6;
        }
        .color-item input[type="color"] {
            width: 100%;
            height: 3rem;
            background: #262439;
            border: 1px solid #4f4b70;
            border-radius: 2rem;
            padding: 0.2rem;
            cursor: pointer;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #dddaf0;
        }
        .slider-label span:first-child {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        input[type="range"] {
            width: 100%;
            background: transparent;
            accent-color: #b48cf2;
        }
        .value-badge {
            background: #262439;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            border: 1px solid #4f4b70;
        }
        .direction-hint {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #8f8ab0;
            margin-top: 0.2rem;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: #dddaf0;
            margin-top: 0.5rem;
        }
        .checkbox-row input[type="checkbox"] {
            width: 1.2rem;
            height: 1.2rem;
            accent-color: #b48cf2;
            cursor: pointer;
        }

        .ring-wrapper {
            flex: 1 1 460px;
            min-width: 340px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 2.5rem;
            padding: 1rem;
            border: 1px solid rgba(255,255,255,0.04);
            transition: all 0.2s;
        }
        .ring-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            max-width: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        svg {
            width: 100%;
            height: auto;
            display: block;
            background: transparent;
            transform-origin: center center;
            will-change: transform;
        }
        .footer-note {
            margin-top: 1rem;
            color: #8f8ab0;
            font-size: 0.9rem;
            text-align: center;
        }
        .focus-hint {
            margin-top: 1rem;
            color: #7f79a2;
            font-size: 0.8rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        kbd {
            background: #2e2a44;
            border-radius: 0.5rem;
            padding: 0.2rem 0.8rem;
            font-family: monospace;
            border: 1px solid #736d9a;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="dashboard">
        <!-- CONTROL PANEL (left) -->
        <div class="control-panel">
            <h3>⭕ text ring · controls</h3>
            <input type="text" id="textInput" value="The quick brown fox jumps over the lazy dog" placeholder="your text here...">

            <div class="control-grid">
                <div class="color-row">
                    <div class="color-item">
                        <label>🎨 text color</label>
                        <input type="color" id="textColor" value="#ffffff">
                    </div>
                    <div class="color-item">
                        <label>✒️ outline color</label>
                        <input type="color" id="outlineColor" value="#aa7eec">
                    </div>
                </div>

                <div class="checkbox-row">
                    <input type="checkbox" id="outlineToggle" checked>
                    <label for="outlineToggle">enable outline (uncheck to disable)</label>
                </div>

                <div class="slider-group">
                    <div class="slider-label">
                        <span>⭕ circle radius</span>
                        <span id="radiusDisplay" class="value-badge">200</span>
                    </div>
                    <input type="range" id="radiusSlider" min="120" max="280" value="200" step="1">
                    <div class="direction-hint">smaller = tighter curve · larger = wider ring</div>
                </div>

                <div class="slider-group">
                    <div class="slider-label">
                        <span>🔠 font size</span>
                        <span id="fontSizeDisplay" class="value-badge">30</span>
                    </div>
                    <input type="range" id="fontSizeSlider" min="16" max="70" value="30" step="1">
                </div>

                <div class="slider-group">
                    <div class="slider-label">
                        <span>⚡ spin speed & direction</span>
                        <span id="speedDisplay" class="value-badge">1.0</span>
                    </div>
                    <input type="range" id="speedSlider" min="-3" max="3" value="1" step="0.1">
                    <div class="direction-hint">
                        <span>◀ counter‑clockwise</span>
                        <span>stop</span>
                        <span>clockwise ▶</span>
                    </div>
                </div>
            </div>
            <div class="focus-hint">
                <span><kbd>N</kbd> toggle focus mode</span>
                <span><kbd>ESC</kbd> exit</span>
            </div>
        </div>

        <!-- RING (right) – stays visible in focus mode -->
        <div class="ring-wrapper">
            <div class="ring-container">
                <svg viewBox="0 0 600 600" preserveAspectRatio="xMidYMid meet" id="spinningSvg">
                    <path id="circlePath" 
                          d="M 300,300 m -200, 0 a 200,200 0 1,1 400,0 a 200,200 0 1,1 -400,0" 
                          fill="none" stroke="none" />
                    <text id="outlineText" fill="none" stroke="#aa7eec" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" font-family="'Courier New', monospace" font-size="30" font-weight="bold" text-anchor="middle">
                        <textPath href="#circlePath" startOffset="50%">The quick brown fox jumps over the lazy dog</textPath>
                    </text>
                    <text id="mainText" fill="#ffffff" font-family="'Courier New', monospace" font-size="30" font-weight="bold" text-anchor="middle">
                        <textPath href="#circlePath" startOffset="50%">The quick brown fox jumps over the lazy dog</textPath>
                    </text>
                </svg>
            </div>
        </div>
    </div>
    <div class="footer-note">adjust radius & font size · outline toggle · press N for clean overlay</div>
</div>

<script>
    (function() {
        // Elements
        const textInput = document.getElementById('textInput');
        const textPathMain = document.querySelector('#mainText textPath');
        const textPathOutline = document.querySelector('#outlineText textPath');
        const mainText = document.getElementById('mainText');
        const outlineText = document.getElementById('outlineText');
        const textColorPicker = document.getElementById('textColor');
        const outlineColorPicker = document.getElementById('outlineColor');
        const outlineToggle = document.getElementById('outlineToggle');
        const circlePath = document.getElementById('circlePath');
        const svg = document.getElementById('spinningSvg');

        const radiusSlider = document.getElementById('radiusSlider');
        const radiusDisplay = document.getElementById('radiusDisplay');
        const fontSizeSlider = document.getElementById('fontSizeSlider');
        const fontSizeDisplay = document.getElementById('fontSizeDisplay');
        const speedSlider = document.getElementById('speedSlider');
        const speedDisplay = document.getElementById('speedDisplay');

        let angle = 0;
        let lastTimestamp = null;
        let currentSpeed = 1.0;

        // Update path based on radius
        function updatePath(radius) {
            const centerX = 300, centerY = 300;
            const d = `M ${centerX},${centerY} m -${radius},0 a ${radius},${radius} 0 1,1 ${2*radius},0 a ${radius},${radius} 0 1,1 -${2*radius},0`;
            circlePath.setAttribute('d', d);
        }

        function updateText() {
            let newText = textInput.value;
            if (newText.trim() === '') newText = ' ';
            textPathMain.textContent = newText;
            textPathOutline.textContent = newText;
        }

        function updateTextColor() {
            mainText.setAttribute('fill', textColorPicker.value);
        }

        function updateOutline() {
            if (outlineToggle.checked) {
                outlineText.setAttribute('stroke', outlineColorPicker.value);
            } else {
                outlineText.setAttribute('stroke', 'none');
            }
        }

        function updateFontSize() {
            const size = fontSizeSlider.value;
            fontSizeDisplay.textContent = size;
            mainText.setAttribute('font-size', size);
            outlineText.setAttribute('font-size', size);
        }

        function updateRadius() {
            const radius = radiusSlider.value;
            radiusDisplay.textContent = radius;
            updatePath(radius);
        }

        function updateSpeed() {
            currentSpeed = parseFloat(speedSlider.value);
            speedDisplay.textContent = currentSpeed.toFixed(1);
        }

        // Event listeners
        textInput.addEventListener('input', updateText);
        textColorPicker.addEventListener('input', updateTextColor);
        outlineColorPicker.addEventListener('input', updateOutline);
        outlineToggle.addEventListener('change', updateOutline);
        radiusSlider.addEventListener('input', updateRadius);
        fontSizeSlider.addEventListener('input', updateFontSize);
        speedSlider.addEventListener('input', updateSpeed);

        // Initial updates
        updateText();
        updateTextColor();
        updateOutline();
        updateRadius();
        updateFontSize();
        updateSpeed();

        // Animation loop
        function rotate(timestamp) {
            if (lastTimestamp !== null) {
                const delta = Math.min(100, timestamp - lastTimestamp);
                // at speed=1, full rotation in 10s => 0.036 deg/ms
                const rotationDelta = currentSpeed * delta * 0.036;
                angle += rotationDelta;
                svg.style.transform = `rotate(${angle}deg)`;
            }
            lastTimestamp = timestamp;
            requestAnimationFrame(rotate);
        }
        requestAnimationFrame(rotate);

        // ----- FOCUS MODE (N key) -----
        function toggleFocus() {
            document.body.classList.toggle('focus-mode');
        }
        function exitFocus() {
            document.body.classList.remove('focus-mode');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'n' || e.key === 'N') {
                e.preventDefault(); // avoid browser search
                toggleFocus();
            } else if (e.key === 'Escape') {
                exitFocus();
            }
        });
    })();
</script>
</body>
</html>
