<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>spinning text ring · ultimate control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 1rem;
            transition: background 0.2s;
        }

        /* ---------- FOCUS MODE – clean & transparent ---------- */
        body.focus-mode {
            background: transparent !important;
            padding: 0 !important;
        }
        body.focus-mode .app {
            background: transparent !important;
            box-shadow: none !important;
            padding: 0 !important;
        }
        body.focus-mode .control-panel,
        body.focus-mode .footer-note,
        body.focus-mode .focus-hint {
            display: none !important;
        }
        body.focus-mode .ring-wrapper {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        body.focus-mode .ring-container {
            max-width: 90vmin;
            max-height: 90vmin;
            background: transparent;
        }
        body.focus-mode svg {
            background: transparent;
        }

        /* ---------- main app container ---------- */
        .app {
            width: 1300px;
            max-width: 95vw;
            background: rgba(20, 20, 35, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 3rem 2rem 2rem 3rem;
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.06);
            padding: 2rem 1.8rem;
            transition: all 0.25s ease;
        }

        /* two‑column layout */
        .dashboard {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* ---------- CONTROL PANEL – scrollable & compact ---------- */
        .control-panel {
            flex: 1 1 340px;
            background: rgba(24, 24, 40, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 1.5rem 1.2rem;
            color: #eeeaff;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 30px -10px black;
            max-height: 500px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #b48cf2 #262439;
        }
        .control-panel::-webkit-scrollbar {
            width: 8px;
        }
        .control-panel::-webkit-scrollbar-track {
            background: #262439;
            border-radius: 4px;
        }
        .control-panel::-webkit-scrollbar-thumb {
            background: #b48cf2;
            border-radius: 4px;
        }

        .control-panel h3 {
            font-weight: 350;
            font-size: 1.3rem;
            margin-bottom: 1.2rem;
            border-bottom: 1px dashed #5f5c8a;
            padding-bottom: 0.5rem;
        }

        /* text input */
        input[type="text"] {
            width: 100%;
            background: #262439;
            border: 1px solid #4f4b70;
            border-radius: 3rem;
            padding: 0.7rem 1.2rem;
            color: white;
            font-size: 1rem;
            outline: none;
            margin-bottom: 1rem;
        }
        input[type="text"]:focus {
            border-color: #b48cf2;
            box-shadow: 0 0 0 2px rgba(180,140,242,0.3);
        }

        .control-grid {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        /* color pickers row */
        .color-row {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .color-item {
            flex: 1 1 150px;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .color-item label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #c7c1e6;
        }
        .color-item input[type="color"] {
            width: 100%;
            height: 2.5rem;
            background: #262439;
            border: 1px solid #4f4b70;
            border-radius: 2rem;
            padding: 0.1rem;
            cursor: pointer;
        }

        /* outline toggle */
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            margin: 0.2rem 0;
        }
        .checkbox-row input[type="checkbox"] {
            width: 1.2rem;
            height: 1.2rem;
            accent-color: #b48cf2;
            cursor: pointer;
        }

        /* font dropdown */
        .select-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .select-group label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #c7c1e6;
        }
        select {
            background: #262439;
            border: 1px solid #4f4b70;
            border-radius: 3rem;
            padding: 0.5rem 1rem;
            color: white;
            font-size: 0.9rem;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23b48cf2' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 0.8rem;
            cursor: pointer;
        }

        /* sliders */
        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }
        input[type="range"] {
            width: 100%;
            accent-color: #b48cf2;
            height: 1.8rem;
            cursor: pointer;
        }
        .value-badge {
            background: #262439;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.8rem;
        }
        .direction-hint {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #8f8ab0;
        }

        /* focus hint */
        .focus-hint {
            margin-top: 0.8rem;
            color: #7f79a2;
            font-size: 0.75rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        kbd {
            background: #2e2a44;
            border-radius: 0.4rem;
            padding: 0.1rem 0.5rem;
            border: 1px solid #736d9a;
        }

        /* ---------- RING WRAPPER ---------- */
        .ring-wrapper {
            flex: 1 1 460px;
            min-width: 340px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 2.5rem;
            padding: 1rem;
            border: 1px solid rgba(255,255,255,0.04);
            transition: all 0.2s;
        }
        .ring-container {
            width: 100%;
            aspect-ratio: 1/1;
            max-width: 500px;
        }
        svg {
            width: 100%;
            height: auto;
            display: block;
            background: transparent;
            transform-origin: center center;
            will-change: transform;
        }

        .footer-note {
            margin-top: 1rem;
            color: #8f8ab0;
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <div class="dashboard">
        <!-- CONTROL PANEL (scrollable) -->
        <div class="control-panel">
            <h3>⭕ spinning text ring</h3>
            <input type="text" id="textInput" value="The quick brown fox jumps over the lazy dog" placeholder="your text...">

            <div class="control-grid">
                <div class="color-row">
                    <div class="color-item">
                        <label>text color</label>
                        <input type="color" id="textColor" value="#ffffff">
                    </div>
                    <div class="color-item">
                        <label>outline color</label>
                        <input type="color" id="outlineColor" value="#aa7eec">
                    </div>
                </div>

                <div class="checkbox-row">
                    <input type="checkbox" id="outlineToggle" checked>
                    <label for="outlineToggle">enable outline</label>
                </div>

                <div class="select-group">
                    <label>font family</label>
                    <select id="fontSelect">
                        <option value="'Courier New', monospace" selected>Courier New (mono)</option>
                        <option value="Arial, sans-serif">Arial (sans)</option>
                        <option value="'Times New Roman', serif">Times New Roman (serif)</option>
                        <option value="Georgia, serif">Georgia (serif)</option>
                        <option value="Verdana, sans-serif">Verdana (sans)</option>
                        <option value="'Comic Sans MS', cursive, sans-serif">Comic Sans (cursive)</option>
                        <option value="Impact, sans-serif">Impact (bold)</option>
                        <option value="'Trebuchet MS', sans-serif">Trebuchet MS (sans)</option>
                        <option value="'Arial Black', sans-serif">Arial Black (bold)</option>
                        <option value="'Segoe UI', sans-serif">Segoe UI (system)</option>
                    </select>
                </div>

                <div class="slider-group">
                    <div class="slider-label">
                        <span>⭕ radius</span>
                        <span id="radiusDisplay" class="value-badge">250</span>
                    </div>
                    <input type="range" id="radiusSlider" min="100" max="350" value="250" step="1">
                </div>

                <div class="slider-group">
                    <div class="slider-label">
                        <span>🔠 font size</span>
                        <span id="fontSizeDisplay" class="value-badge">36</span>
                    </div>
                    <input type="range" id="fontSizeSlider" min="12" max="100" value="36" step="1">
                </div>

                <div class="slider-group">
                    <div class="slider-label">
                        <span>⚡ speed</span>
                        <span id="speedDisplay" class="value-badge">1.0</span>
                    </div>
                    <input type="range" id="speedSlider" min="-3" max="3" value="1" step="0.1">
                    <div class="direction-hint">
                        <span>◀ reverse</span><span>stop</span><span>fast ▶</span>
                    </div>
                </div>
            </div>
            <div class="focus-hint">
                <span><kbd>N</kbd> focus mode (transparent)</span>
                <span><kbd>ESC</kbd> exit</span>
            </div>
        </div>

        <!-- RING (right side) -->
        <div class="ring-wrapper">
            <div class="ring-container">
                <svg viewBox="0 0 800 800" preserveAspectRatio="xMidYMid meet" id="spinningSvg">
                    <!-- circle path (will be updated by JS) -->
                    <path id="circlePath" d="M 400,400 m -250,0 a 250,250 0 1,1 500,0 a 250,250 0 1,1 -500,0" fill="none" stroke="none" />
                    <!-- outline text (stroke) – placed first so it appears behind main text -->
                    <text id="outlineText" fill="none" stroke="#aa7eec" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" font-family="'Courier New', monospace" font-size="36" font-weight="bold" text-anchor="middle">
                        <textPath href="#circlePath" startOffset="50%">The quick brown fox jumps over the lazy dog</textPath>
                    </text>
                    <!-- main text (fill) -->
                    <text id="mainText" fill="#ffffff" font-family="'Courier New', monospace" font-size="36" font-weight="bold" text-anchor="middle">
                        <textPath href="#circlePath" startOffset="50%">The quick brown fox jumps over the lazy dog</textPath>
                    </text>
                </svg>
            </div>
        </div>
    </div>
    <div class="footer-note">adjust everything · N toggles clean transparent overlay</div>
</div>

<script>
    (function() {
        // ----- DOM elements -----
        const textInput = document.getElementById('textInput');
        const textPathMain = document.querySelector('#mainText textPath');
        const textPathOutline = document.querySelector('#outlineText textPath');
        const mainText = document.getElementById('mainText');
        const outlineText = document.getElementById('outlineText');
        const textColorPicker = document.getElementById('textColor');
        const outlineColorPicker = document.getElementById('outlineColor');
        const outlineToggle = document.getElementById('outlineToggle');
        const fontSelect = document.getElementById('fontSelect');
        const circlePath = document.getElementById('circlePath');
        const svg = document.getElementById('spinningSvg');

        const radiusSlider = document.getElementById('radiusSlider');
        const radiusDisplay = document.getElementById('radiusDisplay');
        const fontSizeSlider = document.getElementById('fontSizeSlider');
        const fontSizeDisplay = document.getElementById('fontSizeDisplay');
        const speedSlider = document.getElementById('speedSlider');
        const speedDisplay = document.getElementById('speedDisplay');

        // ----- state for rotation -----
        let angle = 0;
        let lastTimestamp = null;
        let currentSpeed = 1.0;

        // ----- helper: update circle path (center at 400,400) -----
        function updatePath(radius) {
            const cx = 400, cy = 400;
            const d = `M ${cx},${cy} m -${radius},0 a ${radius},${radius} 0 1,1 ${2*radius},0 a ${radius},${radius} 0 1,1 -${2*radius},0`;
            circlePath.setAttribute('d', d);
        }

        // ----- update text content (both layers) -----
        function updateText() {
            let newText = textInput.value;
            if (newText.trim() === '') newText = ' '; // non‑breaking space to keep path active
            textPathMain.textContent = newText;
            textPathOutline.textContent = newText;
        }

        // ----- update colors -----
        function updateTextColor() {
            mainText.setAttribute('fill', textColorPicker.value);
        }

        function updateOutline() {
            if (outlineToggle.checked) {
                outlineText.setAttribute('stroke', outlineColorPicker.value);
            } else {
                outlineText.setAttribute('stroke', 'none');
            }
        }

        // ----- font family -----
        function updateFont() {
            const font = fontSelect.value;
            mainText.setAttribute('font-family', font);
            outlineText.setAttribute('font-family', font);
        }

        // ----- font size -----
        function updateFontSize() {
            const size = fontSizeSlider.value;
            fontSizeDisplay.textContent = size;
            mainText.setAttribute('font-size', size);
            outlineText.setAttribute('font-size', size);
        }

        // ----- radius -----
        function updateRadius() {
            const radius = radiusSlider.value;
            radiusDisplay.textContent = radius;
            updatePath(radius);
        }

        // ----- speed & direction -----
        function updateSpeed() {
            currentSpeed = parseFloat(speedSlider.value);
            speedDisplay.textContent = currentSpeed.toFixed(1);
        }

        // ----- attach event listeners -----
        textInput.addEventListener('input', updateText);
        textColorPicker.addEventListener('input', updateTextColor);
        outlineColorPicker.addEventListener('input', updateOutline);
        outlineToggle.addEventListener('change', updateOutline);
        fontSelect.addEventListener('change', updateFont);
        radiusSlider.addEventListener('input', updateRadius);
        fontSizeSlider.addEventListener('input', updateFontSize);
        speedSlider.addEventListener('input', updateSpeed);

        // ----- initialise everything -----
        updateText();
        updateTextColor();
        updateOutline();
        updateFont();
        updateRadius();
        updateFontSize();
        updateSpeed();

        // ----- animation loop (time‑based, smooth) -----
        function rotate(timestamp) {
            if (lastTimestamp !== null) {
                const delta = Math.min(100, timestamp - lastTimestamp); // safety cap
                // at speed = 1, full rotation in 10s → 0.036 deg/ms
                const rotationDelta = currentSpeed * delta * 0.036;
                angle += rotationDelta;
                svg.style.transform = `rotate(${angle}deg)`;
            }
            lastTimestamp = timestamp;
            requestAnimationFrame(rotate);
        }
        requestAnimationFrame(rotate);

        // ----- FOCUS MODE: N toggles, ESC exits -----
        function toggleFocus() {
            document.body.classList.toggle('focus-mode');
        }
        function exitFocus() {
            document.body.classList.remove('focus-mode');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'n' || e.key === 'N') {
                e.preventDefault(); // prevent browser search
                toggleFocus();
            } else if (e.key === 'Escape') {
                exitFocus();
            }
        });
    })();
</script>
</body>
</html>
